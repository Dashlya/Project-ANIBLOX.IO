<!DOCTYPE html>
<html>
<head>
  <title>Klick das Quadrat</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    #game {
      width: 400px;
      height: 400px;
      border: 2px solid black;
      margin: 20px auto;
      position: relative;
    }
    #box {
      width: 50px;
      height: 50px;
      background-color: red;
      position: absolute;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Klick das Quadrat!</h1>
<p>Punkte: <span id="score">0</span></p>

<div id="game">
  <div id="box"></div>
</div>

<script>
  const box = document.getElementById("box");
  const scoreDisplay = document.getElementById("score");
  let score = 0;

  function moveBox() {
    const x = Math.random() * 350;
    const y = Math.random() * 350;
    box.style.left = x + "px";
    box.style.top = y + "px";
  }

  box.addEventListener("click", () => {
    score++;
    scoreDisplay.textContent = score;
    moveBox();
  });

  moveBox();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Klick das Quadrat - iPad Version</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }
    #game {
      width: 400px;
      height: 400px;
      border: 2px solid black;
      margin: 20px auto;
      position: relative;
    }
    #box {
      width: 50px;
      height: 50px;
      background-color: red;
      position: absolute;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Klick das Quadrat!</h1>
<p>Punkte: <span id="score">0</span></p>

<div id="game">
  <div id="box"></div>
</div>

<script>
  const box = document.getElementById("box");
  const scoreDisplay = document.getElementById("score");
  let score = 0;

  // Touch & Click Event
  function increaseScore() {
    score++;
    scoreDisplay.textContent = score;
    moveBox();
  }
  box.addEventListener("click", increaseScore);
  box.addEventListener("touchstart", increaseScore);

  // Box bewegen und schwieriger machen
  function moveBox() {
    const size = Math.max(20, 50 - score); // wird kleiner mit mehr Punkten
    box.style.width = size + "px";
    box.style.height = size + "px";

    const x = Math.random() * (350 - size);
    const y = Math.random() * (350 - size);
    box.style.left = x + "px";
    box.style.top = y + "px";
  }

  moveBox();

  // Zeitlimit 30 Sekunden
  let timeLeft = 30;
  const timerDisplay = document.createElement("p");
  timerDisplay.textContent = `Zeit: ${timeLeft}`;
  document.body.insertBefore(timerDisplay, document.getElementById("game"));

  const timer = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = `Zeit: ${timeLeft}`;
    if(timeLeft <= 0){
      clearInterval(timer);
      alert(`Game Over! Deine Punkte: ${score}`);
      box.remove();
    }
  }, 1000);
</script>

</body>
</html>
